version: "3.9"

services:
  ts-forecast-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ts-forecast-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/lstm_best.h5
      - SCALER_PATH=/app/models/scaler.joblib
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --default-artifact-root /mlflow/artifacts
        --backend-store-uri sqlite:////mlflow/mlflow.db
    restart: unless-stopped

volumes:
  mlflow-data:
