name: CI — Lint · Test · Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancelar ejecuciones anteriores del mismo PR para ahorrar minutos de CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Linting y formateo de código
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.4.4 black==24.4.2

      - name: Ruff — linting
        run: ruff check . --line-length=100

      - name: Black — format check
        run: black --check --line-length=100 .

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests unitarios por proyecto (matrix)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - time-series-forecast
          - computer-vision-classification
          - credit-scoring-risk

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ matrix.project }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          PYTHONPATH: src

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ${{ matrix.project }}/coverage.xml
          flags: ${{ matrix.project }}
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Escaneo de vulnerabilidades en dependencias
  # ────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: pip-audit — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - time-series-forecast
          - computer-vision-classification
          - credit-scoring-risk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      # pip-audit analiza requirements.txt en busca de CVEs conocidos
      # Usamos --ignore-vuln para bibliotecas con falsos positivos documentados.
      # Cambia --output json para integrar con herramientas SAST externas.
      - name: Audit dependencies — ${{ matrix.project }}
        run: |
          pip-audit \
            -r ${{ matrix.project }}/requirements.txt \
            --output text \
            --progress-spinner off
        continue-on-error: false  # Falla la build si encuentra CVEs críticos

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Verificar que los notebooks no tienen outputs
  # ────────────────────────────────────────────────────────────────────────────
  notebooks-clean:
    name: Notebooks — no outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install nbstripout
        run: pip install nbstripout==0.7.1

      # Verifica que ningún notebook tiene outputs commiteados.
      # Si los hay, el diff no estará vacío y el paso fallará.
      - name: Check notebooks have no outputs
        run: |
          find . -name "*.ipynb" -not -path "*/.git/*" | while read nb; do
            stripped=$(nbstripout --dry-run "$nb" 2>&1)
            if echo "$stripped" | grep -q "would strip"; then
              echo "ERROR: '$nb' tiene outputs — ejecuta 'nbstripout $nb' antes de commitear."
              exit 1
            fi
          done
          echo "Todos los notebooks están limpios."

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5: Build de imágenes Docker (smoke test)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - time-series-forecast
          - computer-vision-classification
          - credit-scoring-risk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.project }}
          push: false
          tags: ${{ matrix.project }}:ci-test
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
