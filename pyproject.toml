# ─────────────────────────────────────────────────────────────────────────────
# pyproject.toml — Configuración central de herramientas de calidad de código
# ─────────────────────────────────────────────────────────────────────────────

[tool.ruff]
target-version = "py311"
line-length = 100
# E/W: errores de estilo PEP 8 | F: pyflakes | I: isort | N: naming
# UP: pyupgrade | S: bandit-security | B: bugbear | C4: comprehensions
select = ["E", "W", "F", "I", "N", "UP", "S", "B", "C4"]
ignore = [
    "S101",   # allow assert in tests
    "S311",   # allow random for non-cryptographic use
    "S603",   # allow subprocess without shell
    "B008",   # allow function calls in default args (FastAPI depends on it)
    "E501",   # line length handled by black
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S", "N"]      # relax security and naming rules in tests
"notebooks/*" = ["E402"]    # allow imports not at top in notebooks

[tool.black]
line-length = 100
target-version = ["py311"]
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -v --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m not slow')",
    "integration: marks tests that require external resources",
]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_return_any = false
warn_unused_configs = true
